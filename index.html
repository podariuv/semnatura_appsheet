<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semnătură AppSheet Instant</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: Arial, sans-serif;
    background:#f0f2f5;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

#start-zone {
    text-align:center;
}

.container {
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    max-width:400px;
}

button {
    cursor:pointer;
    border:none;
    border-radius:6px;
    padding:14px;
    font-size:16px;
}

#enter {
    width:100%;
    background:#007bff;
    color:white;
}

#enter:hover { background:#0056b3; }

#fullscreen {
    display:none;
    width:100%;
    height:100%;
    position:relative;
    background:white;
}

canvas {
    width:100%;
    height:100%;
    touch-action:none;
}

.controls {
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    background:rgba(255,255,255,0.95);
    padding:10px;
    border-radius:10px;
}

.clear { background:#dc3545; color:white; }
.save { background:#28a745; color:white; }
.exit { background:#6c757d; color:white; }

.clear:hover { background:#b52a37; }
.save:hover { background:#1f7a31; }
.exit:hover { background:#555; }
</style>
</head>

<body>

<div id="start-zone">
    <div class="container">
        <h2>Semnătură ridicare</h2>
        <p>Apasă pentru a deschide ecranul de semnătură</p>
        <button id="enter">Deschide</button>
    </div>
</div>

<div id="fullscreen">
    <canvas id="c"></canvas>

    <div class="controls">
        <button class="clear" id="clear">Șterge</button>
        <button class="save" id="save">Salvează</button>
        <button class="exit" id="exit">Ieșire</button>
    </div>
</div>

<script>
const start = document.getElementById("start-zone");
const full = document.getElementById("fullscreen");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let drawing = false;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
}

window.addEventListener("resize", resize);
resize();

document.getElementById("enter").onclick = () => {
    start.style.display = "none";
    full.style.display = "block";
};

document.getElementById("exit").onclick = () => {
    full.style.display = "none";
    start.style.display = "block";
};

function pos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left,
        y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top
    };
}

canvas.addEventListener("mousedown", e => {
    drawing = true;
    const p = pos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
});

canvas.addEventListener("mousemove", e => {
    if (!drawing) return;
    const p = pos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
});

canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mouseleave", () => drawing = false);

canvas.addEventListener("touchstart", e => {
    drawing = true;
    const p = pos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    e.preventDefault();
});

canvas.addEventListener("touchmove", e => {
    if (!drawing) return;
    const p = pos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    e.preventDefault();
});

canvas.addEventListener("touchend", () => drawing = false);

document.getElementById("clear").onclick = () => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
};

document.getElementById("save").onclick = async () => {

    const btn = document.getElementById("save");
    btn.disabled = true;
    btn.innerText = "Se salvează...";

    const image = canvas.toDataURL("image/png");

    const url = "https://script.google.com/macros/s/AKfycbxHpxRCo1pTAXWfwzXyiDsCu1slbkG6hBPx2hGkRxx1EJ8KZIOA1BUuZSaThiJ_pXmrFg/exec";

    try {
        await fetch(url, {
            method: "POST",
            mode: "no-cors",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                image: image
            })
        });

        alert("Semnătura a fost salvată!");

        ctx.clearRect(0,0,canvas.width,canvas.height);

        full.style.display = "none";
        start.style.display = "block";

    } catch (e) {
        alert("Eroare la salvare");
        console.error(e);
    }

    btn.disabled = false;
    btn.innerText = "Salvează";
};
</script>

</body>
</html>
