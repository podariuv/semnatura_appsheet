<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captură Semnătură Fullscreen</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        /* Stiluri pentru starea normală */
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
        }
        h2 {
            margin-bottom: 10px;
            color: #333;
        }
        p {
            margin-bottom: 25px;
            color: #666;
        }
        
        button {
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            transition: background 0.2s, transform 0.1s;
        }
        button:active {
            transform: scale(0.98);
        }
        
        /* Butonul principal de Fullscreen - Centrat */
        #enter-fullscreen {
            padding: 16px 32px;
            font-size: 18px;
            background-color: #007bff;
            color: white;
            width: 100%;
        }
        #enter-fullscreen:hover {
            background-color: #0056b3;
        }
        
        /* Butonul de CLOSE mutat mai la stânga și mai sus conform cerințelor */
        .close-app-btn {
            position: fixed;
            bottom: 170px; /* Ridicat mai sus (aprox. 4cm) */
            right: 210px;  /* Mutat mai la stânga (aprox. 5cm) */
            padding: 12px 24px;
            font-size: 15px;
            background-color: #6c757d;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 10;
        }
        .close-app-btn:hover {
            background-color: #495057;
        }
        
        /* Butoane din bara de control Fullscreen */
        .controls button {
            padding: 12px 24px;
            color: white;
        }
        button.clear-btn {
            background-color: #dc3545;
        }
        button.clear-btn:hover {
            background-color: #bd2130;
        }
        button.save-btn {
            background-color: #28a745;
        }
        button.save-btn:hover {
            background-color: #218838;
        }

        /* Stiluri pentru modul Fullscreen */
        #fullscreen-zone {
            display: none;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            position: relative;
        }
        #signature-canvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
            display: block;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container" id="start-zone">
        <h2>Sistem de Captură Semnătură</h2>
        <p>Apasă butonul de mai jos pentru a deschide zona de desenare în tot ecranul.</p>
        <button id="enter-fullscreen">Deschide Fullscreen</button>
    </div>

    <button id="close-page" class="close-app-btn">Închide Pagina (Close)</button>

    <div id="fullscreen-zone">
        <canvas id="signature-canvas"></canvas>
        <div class="controls">
            <button class="clear-btn" id="clear-canvas">Șterge</button>
            <button class="save-btn" id="save-signature">Salvează Semnătura</button>
            <button id="exit-fullscreen" style="background-color: #6c757d;">Ieșire</button>
        </div>
    </div>

    <script>
        const startZone = document.getElementById('start-zone');
        const fullscreenZone = document.getElementById('fullscreen-zone');
        const canvas = document.getElementById('signature-canvas');
        const ctx = canvas.getContext('2d');
        
        const btnEnter = document.getElementById('enter-fullscreen');
        const btnExit = document.getElementById('exit-fullscreen');
        const btnClosePage = document.getElementById('close-page');
        const btnClear = document.getElementById('clear-canvas');
        const btnSave = document.getElementById('save-signature');

        let isDrawing = false;

        // --- Logica de Fullscreen ---
        btnEnter.addEventListener('click', () => {
            if (fullscreenZone.requestFullscreen) {
                fullscreenZone.requestFullscreen();
            } else if (fullscreenZone.webkitRequestFullscreen) {
                fullscreenZone.webkitRequestFullscreen();
            }
        });

        btnExit.addEventListener('click', () => {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            }
        });

        // --- Logica de Închidere Definitivă a Paginii ---

            window.close();
        });
