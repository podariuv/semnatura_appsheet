<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semnătură AppSheet</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f0f2f5;
    height:100vh;
    overflow:hidden;
}

/* PAGINA INTERMEDIARĂ */

#start-zone{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    text-align:center;
    width:350px;
}

.container h2{
    margin-bottom:10px;
}

.container p{
    margin-bottom:20px;
    color:#666;
}

.container button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

#enter{
    background:#007bff;
    color:white;
}

#closePage{
    background:#dc3545;
    color:white;
}

/* FULLSCREEN */

#fullscreen{
    display:none;
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    background:white;
}

canvas{
    width:100%;
    height:100%;
    display:block;
    touch-action:none;
}

#controls{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    background:rgba(255,255,255,0.95);
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

#controls button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-size:15px;
}

#clear{
    background:#dc3545;
}

#save{
    background:#28a745;
}

#exit{
    background:#6c757d;
}

</style>
</head>

<body>

<!-- PAGINA INTERMEDIARĂ -->

<div id="start-zone">

    <div class="container">

        <h2>Semnătură ridicare</h2>

        <p>Apasă pentru a deschide zona de semnătură</p>

        <button id="enter">Deschide Semnătura</button>

        <button id="closePage">Închide</button>

    </div>

</div>

<!-- FULLSCREEN -->

<div id="fullscreen">

    <canvas id="canvas"></canvas>

    <div id="controls">

        <button id="clear">Șterge</button>

        <button id="save">Salvează</button>

        <button id="exit">Ieșire</button>

    </div>

</div>

<script>

const startZone = document.getElementById("start-zone");
const fullscreen = document.getElementById("fullscreen");

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing = false;

/* CANVAS */

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // FUNDAL
    ctx.fillStyle = "#f2f2f2";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#000";

}

resizeCanvas();

window.addEventListener("resize", resizeCanvas);

/* FULLSCREEN */

document.getElementById("enter").onclick = async () => {

    const el = document.documentElement;

    if(el.requestFullscreen){
        await el.requestFullscreen();
    }

    startZone.style.display = "none";
    fullscreen.style.display = "block";

};

/* CLOSE PAGINA INTERMEDIARĂ */

document.getElementById("closePage").onclick = () => {

    if(document.fullscreenElement){
        document.exitFullscreen();
    }

    window.close();

    setTimeout(()=>{
        history.back();
    },300);

};

/* EXIT FULLSCREEN */

document.getElementById("exit").onclick = async () => {

    if(document.fullscreenElement){
        await document.exitFullscreen();
    }

    fullscreen.style.display = "none";
    startZone.style.display = "flex";

};

/* DESEN */

function getPos(e){

    const rect = canvas.getBoundingClientRect();

    return {
        x:(e.touches ? e.touches[0].clientX : e.clientX) - rect.left,
        y:(e.touches ? e.touches[0].clientY : e.clientY) - rect.top
    };

}

function startDraw(e){

    drawing = true;

    const p = getPos(e);

    ctx.beginPath();
    ctx.moveTo(p.x,p.y);

}

function draw(e){

    if(!drawing) return;

    const p = getPos(e);

    ctx.lineTo(p.x,p.y);
    ctx.stroke();

    e.preventDefault();

}

function stopDraw(){

    drawing = false;
    ctx.closePath();

}

canvas.addEventListener("mousedown",startDraw);
canvas.addEventListener("mousemove",draw);
canvas.addEventListener("mouseup",stopDraw);
canvas.addEventListener("mouseleave",stopDraw);

canvas.addEventListener("touchstart",startDraw);
canvas.addEventListener("touchmove",draw);
canvas.addEventListener("touchend",stopDraw);

/* CLEAR */

document.getElementById("clear").onclick = () => {

    ctx.fillStyle = "#f2f2f2";
    ctx.fillRect(0,0,canvas.width,canvas.height);

};

/* SAVE */

document.getElementById("save").onclick = async () => {

    const btn = document.getElementById("save");

    btn.disabled = true;
    btn.innerText = "Se salvează...";

    const image = canvas.toDataURL("image/png");

    const url = "https://script.google.com/macros/s/AKfycbxadQGW4tKCywK4wt-UOcdg_A9JMzcoZBai3IXSS_qoN5OaYdh_Ehc8Uw_SrSWGJrY9Dw/exec";

    try{

        await fetch(url,{
            method:"POST",
            mode:"no-cors",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                image:image,
                id:new URLSearchParams(window.location.search).get("id")
            })
        });

        alert("Semnătura a fost salvată!");

        /* IEȘIRE FULLSCREEN */

        if(document.fullscreenElement){
            await document.exitFullscreen();
        }

        /* ÎNCHIDE PAGINA */

        setTimeout(()=>{

            window.close();

            history.back();

        },300);

    }
    catch(err){

        alert("Eroare la salvare");

        console.error(err);

    }

    btn.disabled = false;
    btn.innerText = "Salvează";

};

</script>

</body>
</html>
